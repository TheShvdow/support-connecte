<div class="real-wrap">
  <h1 class="real-h1">{{ t().realTitle }}</h1>
  <p class="real-sub">{{ t().realSub }}</p>

  <div class="filter-bar">
    @for (cat of categories(); track cat) {
      <button class="filter-pill" [class.active]="store.realFilter() === cat" (click)="store.setRealFilter(cat)">
        {{ cat }}
      </button>
    }
  </div>

  <div class="real-grid-full">
    @for (r of filtered(); track r.id) {
      <div class="work-card">
        <div class="work-thumb" [style.background]="r.color + '18'">
          <div class="work-badge">
            <span class="badge-dot" [style.background]="r.color"></span>{{ r.cat }}
          </div>
          <div class="work-ph">◆</div>
        </div>
        <div class="work-info">{{ store.lang() === 'fr' ? r.fr : r.en }}</div>
      </div>
    }
  </div>
</div>

<app-footer />
